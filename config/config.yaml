app:
  name: mcp-crm
  version: 0.1.0
  instructions: >-
    Manage CRM users with persistent storage and semantic search over local
    embeddings.

runtime:
  data_dir: data/runtime
  db_filename: users.db
  sqlite_timeout_seconds: 30

embedding:
  provider: sentence-transformers
  model: sentence-transformers/all-MiniLM-L6-v2

search:
  default_top_k: 5
  max_top_k: 100

pagination:
  default_limit: 20
  max_limit: 100

testing:
  deterministic_embedding_dimensions: 16
  docker_image: mcp-crm:latest

logging:
  default_format: json

llm:
  provider: disabled
  model: gpt-4.1-mini
  base_url: https://api.openai.com/v1
  timeout_seconds: 30
  system_prompt: >-
    You are a CRM assistant. Answer only with facts grounded in the provided CRM
    matches. If the context is insufficient, say that clearly.
